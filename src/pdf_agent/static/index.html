<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--bg-sidebar:#fff;--bg-input:#fff;
  --bg-user:#4f46e5;--bg-agent:#fff;--bg-tool:#f1f5f9;
  --text:#1e293b;--text-secondary:#64748b;--text-user:#fff;--text-agent:#1e293b;
  --border:#e2e8f0;--accent:#4f46e5;--accent-hover:#4338ca;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",monospace;
}
[data-theme="dark"]{
  --bg:#0f172a;--bg-sidebar:#1e293b;--bg-input:#1e293b;
  --bg-user:#4f46e5;--bg-agent:#1e293b;--bg-tool:#0f172a;
  --text:#e2e8f0;--text-secondary:#94a3b8;--text-user:#fff;--text-agent:#e2e8f0;
  --border:#334155;--accent:#818cf8;--accent-hover:#6366f1;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--bg)}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit;background:var(--bg-input);color:var(--text)}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Sidebar */
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sidebar-header h2{font-size:15px;font-weight:600;flex:1}
.btn-new{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:background .15s}
.btn-new:hover{background:var(--accent-hover)}
.btn-icon{background:none;border:1px solid var(--border);color:var(--text-secondary);width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}

.search-bar{padding:8px 10px;border-bottom:1px solid var(--border)}
.search-bar input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;outline:none;background:var(--bg);color:var(--text)}
.search-bar input:focus{border-color:var(--accent)}

.thread-list{flex:1;overflow-y:auto;padding:6px}
.thread-item{padding:9px 11px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:2px;transition:background .1s}
.thread-item:hover{background:var(--bg-tool)}
.thread-item.active{background:#eef2ff;color:var(--accent)}
[data-theme="dark"] .thread-item.active{background:#1e1b4b}
.thread-item .ti-text{flex:1;min-width:0}
.thread-item .ti-id{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread-item .ti-meta{font-size:11px;color:var(--text-secondary)}
.thread-item .ti-del{opacity:0;background:none;border:none;color:#ef4444;font-size:16px;padding:2px 4px;border-radius:4px;transition:opacity .15s;flex-shrink:0}
.thread-item:hover .ti-del{opacity:.6}
.thread-item .ti-del:hover{opacity:1;background:#fee2e2}

/* Chat header */
.chat-header{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--bg-sidebar);display:flex;align-items:center;gap:10px;min-height:50px}
.chat-header h3{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-actions{display:flex;gap:6px}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:80%;display:flex;flex-direction:column;gap:4px;animation:fadeIn .2s ease}
.msg.hidden{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end}
.msg.agent{align-self:flex-start}
.msg-bubble{padding:10px 14px;border-radius:var(--radius);line-height:1.55;font-size:14px;word-break:break-word;box-shadow:var(--shadow)}
.msg.user .msg-bubble{background:var(--bg-user);color:var(--text-user);border-bottom-right-radius:4px}
.msg.agent .msg-bubble{background:var(--bg-agent);color:var(--text-agent);border-bottom-left-radius:4px}
.msg-bubble p{margin:0 0 8px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble code{font-family:var(--mono);font-size:12px;background:rgba(0,0,0,.08);padding:1px 4px;border-radius:3px}
.msg-bubble pre{background:#1e293b;color:#e2e8f0;padding:12px;border-radius:var(--radius-sm);overflow-x:auto;margin:8px 0;font-size:12px}
.msg-bubble pre code{background:none;padding:0;color:inherit}
.msg-bubble a{color:var(--accent);text-decoration:underline}
.msg.user .msg-bubble code{background:rgba(255,255,255,.2)}
mark{background:rgba(255,220,0,.4);border-radius:2px;padding:0 1px}

/* Tool cards */
.tool-card{background:var(--bg-tool);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;max-width:80%;align-self:flex-start;animation:fadeIn .2s ease}
.tool-card .tc-header{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.tool-card .tc-icon{width:20px;height:20px;background:var(--accent);color:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tool-card .tc-name{font-weight:600;flex:1}
.tool-card .tc-status{font-size:11px;color:var(--text-secondary)}
.tool-card .tc-chevron{color:var(--text-secondary);transition:transform .15s;font-size:12px}
.tool-card.expanded .tc-chevron{transform:rotate(90deg)}
.tool-card .tc-body{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.tool-card.expanded .tc-body{display:block}
.tool-card .tc-args,.tool-card .tc-output{font-family:var(--mono);font-size:12px;white-space:pre-wrap;color:var(--text-secondary);margin:4px 0}
.tool-card .tc-args-label,.tool-card .tc-output-label{font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tool-card .tc-files{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
.tool-card .tc-files a{display:inline-flex;align-items:center;gap:4px;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--accent);text-decoration:none;transition:border-color .15s}
.tool-card .tc-files a:hover{border-color:var(--accent)}

.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-bar .progress-fill{height:100%;background:var(--accent);border-radius:2px;animation:indeterminate 1.5s ease-in-out infinite}
@keyframes indeterminate{0%{width:0;margin-left:0}50%{width:40%;margin-left:30%}100%{width:0;margin-left:100%}}

/* Input area */
.input-area{padding:12px 18px 14px;border-top:1px solid var(--border);background:var(--bg-sidebar)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:8px;transition:all .15s;display:none}
.upload-zone.active{display:block}
.upload-zone.dragover{border-color:var(--accent);background:rgba(79,70,229,.05)}
.file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.2);color:var(--accent);padding:3px 6px 3px 3px;border-radius:8px;font-size:12px}
.file-chip img{width:28px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--border)}
.file-chip .chip-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip button{background:none;border:none;color:var(--accent);font-size:14px;line-height:1;padding:0 2px}

/* Workflow selector */
.workflow-bar{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;overflow-x:auto;flex-shrink:0}
.workflow-bar::-webkit-scrollbar{height:3px}
.wf-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text-secondary);white-space:nowrap;transition:all .15s;flex-shrink:0}
.wf-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,70,229,.05)}
.wf-label{font-size:11px;color:var(--text-secondary);flex-shrink:0;font-weight:500}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;line-height:1.4;max-height:120px;outline:none;transition:border-color .15s;background:var(--bg-input);color:var(--text)}
.input-row textarea:focus{border-color:var(--accent)}
.btn-send{background:var(--accent);color:#fff;border:none;width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.btn-send:hover{background:var(--accent-hover)}
.btn-send:disabled{opacity:.5;cursor:not-allowed}
.btn-attach{background:none;border:1px solid var(--border);width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:border-color .15s;flex-shrink:0}
.btn-attach:hover{border-color:var(--accent);color:var(--accent)}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-secondary);gap:12px;padding:40px}
.empty-state .es-icon{font-size:48px;opacity:.3}
.empty-state h3{font-size:18px;color:var(--text);font-weight:600}
.empty-state p{font-size:14px;text-align:center;max-width:360px;line-height:1.5}

/* Responsive */
@media(max-width:768px){
  .sidebar{position:absolute;left:-280px;z-index:10;height:100%;transition:left .2s}
  .sidebar.open{left:0}
  .menu-toggle{display:block!important}
}
.menu-toggle{display:none;background:none;border:none;font-size:20px;padding:4px 8px;color:var(--text)}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#9ca3af}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:#475569}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 id="appTitle">PDF Agent</h2>
      <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" title="Dark mode">&#9790;</button>
      <button class="btn-new" onclick="newChat()" id="btnNew">+ New</button>
    </div>
    <div class="search-bar"><input id="searchInput" placeholder="Search messages..." oninput="filterMessages(this.value)"></div>
    <div class="thread-list" id="threadList"></div>
  </aside>
  <div class="main">
    <div class="chat-header">
      <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
      <h3 id="chatTitle">New Chat</h3>
      <div class="header-actions">
        <button class="btn-icon" onclick="exportChat('md')" title="Export Markdown">&#8681;</button>
        <button class="btn-icon" onclick="exportChat('json')" title="Export JSON">{ }</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="es-icon">&#128196;</div>
        <h3 id="emptyTitle">PDF Agent Toolbox</h3>
        <p id="emptyDesc">Upload a PDF and tell me what you'd like to do. I can rotate, merge, split, compress, watermark, OCR, and much more.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="workflow-bar" id="workflowBar"><span class="wf-label">&#9889;</span></div>
      <div class="upload-zone" id="uploadZone">Drop files here or <label style="color:var(--accent);cursor:pointer;text-decoration:underline"><input type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none" onchange="handleFileSelect(this.files)">browse</label></div>
      <div class="file-chips" id="fileChips"></div>
      <div class="input-row">
        <button class="btn-attach" onclick="toggleUpload()" title="Attach files">&#128206;</button>
        <textarea id="msgInput" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()" title="Send">&#10148;</button>
      </div>
    </div>
  </div>
</div>
<script>
// State
let currentThreadId = null, pendingFiles = [], isStreaming = false, chatHistory = [];
let apiKey = localStorage.getItem('pdf_agent_api_key') || '';
const $ = id => document.getElementById(id);
const $messages = $('messages'), $input = $('msgInput'), $threadList = $('threadList');
const $emptyState = $('emptyState'), $fileChips = $('fileChips'), $chatTitle = $('chatTitle');
const $uploadZone = $('uploadZone');

// API
function hdrs(extra={}) { const h={...extra}; if(apiKey) h['X-API-Key']=apiKey; return h; }
async function api(path,opts={}) { opts.headers=hdrs(opts.headers||{}); const r=await fetch(path,opts); if(!r.ok){const b=await r.json().catch(()=>({}));throw new Error(b.detail||`HTTP ${r.status}`);}return r.json();}

// Theme
function toggleTheme() {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('pdf_agent_theme', t);
  $('themeBtn').innerHTML = t==='dark' ? '&#9788;' : '&#9790;';
  $('themeBtn').title = t==='dark' ? 'Light mode' : 'Dark mode';
}
(function(){const t=localStorage.getItem('pdf_agent_theme');if(t){document.documentElement.dataset.theme=t;if(t==='dark')$('themeBtn').innerHTML='&#9788;';}})();

// Threads
async function loadThreads(){try{const d=await api('/api/agent/threads');renderThreadList(d.threads||[]);}catch{}}
function renderThreadList(threads){
  $threadList.innerHTML='';
  threads.forEach(t=>{const el=document.createElement('div');el.className='thread-item'+(t.thread_id===currentThreadId?' active':'');
    const s=t.thread_id.slice(0,8),d=new Date(t.updated_at*1000).toLocaleString();
    el.innerHTML=`<div class="ti-text" onclick="openThread('${t.thread_id}')"><div class="ti-id">${s}...</div><div class="ti-meta">${d}</div></div><button class="ti-del" onclick="event.stopPropagation();deleteThread('${t.thread_id}')" title="Delete">&times;</button>`;
    $threadList.appendChild(el);});
}
async function openThread(tid){
  currentThreadId=tid;$chatTitle.textContent=tid.slice(0,12)+'...';clearMessages();chatHistory=[];
  try{const d=await api(`/api/agent/threads/${tid}`);
    (d.messages||[]).forEach(m=>{
      if(m.type==='human'){addMessage('user',m.content);chatHistory.push({role:'user',content:m.content});}
      else if(m.type==='ai'&&m.content){addMessage('agent',m.content);chatHistory.push({role:'agent',content:m.content});}
      else if(m.type==='tool'&&m.content){addToolCard(m.name||'tool',{},m.content,[],null,true);chatHistory.push({role:'tool',name:m.name,content:m.content});}
    });
  }catch(e){addMessage('agent','Failed to load: '+e.message);}
  loadThreads();
}
async function deleteThread(tid){if(!confirm('Delete this thread?'))return;try{await api(`/api/agent/threads/${tid}`,{method:'DELETE'});if(currentThreadId===tid)newChat();loadThreads();}catch(e){alert(e.message);}}
function newChat(){currentThreadId=null;$chatTitle.textContent='New Chat';pendingFiles=[];renderFileChips();clearMessages();chatHistory=[];$emptyState.style.display='';loadThreads();}

// Messages
function clearMessages(){$messages.innerHTML='';$emptyState.style.display='';$messages.appendChild($emptyState);}
function addMessage(role,content){
  $emptyState.style.display='none';
  const msg=document.createElement('div');msg.className='msg '+role;msg.dataset.text=content;
  const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.innerHTML=renderMd(content);
  msg.appendChild(bubble);$messages.appendChild(msg);scrollBottom();return bubble;
}
function addStreamingBubble(){
  $emptyState.style.display='none';
  const msg=document.createElement('div');msg.className='msg agent';
  const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.id='streaming-bubble';
  msg.appendChild(bubble);$messages.appendChild(msg);scrollBottom();return bubble;
}
function addToolCard(name,args,output,files,elapsed,done){
  $emptyState.style.display='none';
  const card=document.createElement('div');card.className='tool-card'+(done?' expanded':'');
  let argsStr='';if(args&&Object.keys(args).length)argsStr=Object.entries(args).map(([k,v])=>`${k}: ${JSON.stringify(v)}`).join('\n');
  let filesHtml='';if(files&&files.length)filesHtml='<div class="tc-files">'+files.map(f=>{const n=f.split('/').pop();return`<a href="${f}" download>&#128196; ${n}</a>`;}).join('')+'</div>';
  const st=done?(elapsed!=null?`Done (${elapsed}s)`:'Done'):'Running...';
  card.innerHTML=`<div class="tc-header" onclick="this.parentElement.classList.toggle('expanded')"><div class="tc-icon">T</div><span class="tc-name">${esc(name)}</span><span class="tc-status">${st}</span><span class="tc-chevron">&#9654;</span></div><div class="tc-body">${argsStr?`<div class="tc-args-label">Args</div><div class="tc-args">${esc(argsStr)}</div>`:''}${output?`<div class="tc-output-label">Output</div><div class="tc-output">${esc(output)}</div>`:''}${filesHtml}</div>${!done?'<div class="progress-bar"><div class="progress-fill"></div></div>':''}`;
  $messages.appendChild(card);scrollBottom();return card;
}
function scrollBottom(){requestAnimationFrame(()=>{$messages.scrollTop=$messages.scrollHeight;});}

// File upload
function toggleUpload(){$uploadZone.classList.toggle('active');}
async function handleFileSelect(fl){for(const f of fl){try{const fd=new FormData();fd.append('file',f);const r=await fetch('/api/files',{method:'POST',body:fd,headers:hdrs()});if(!r.ok)throw new Error('Upload failed');const d=await r.json();pendingFiles.push({id:d.id,name:d.orig_name,mime:d.mime_type});renderFileChips();}catch(e){alert('Upload error: '+e.message);}}$uploadZone.classList.remove('active');}
function renderFileChips(){
  $fileChips.innerHTML='';
  pendingFiles.forEach((f,i)=>{
    const c=document.createElement('span');c.className='file-chip';
    const thumb=f.mime==='application/pdf'?`<img src="/api/files/${f.id}/thumbnail" onerror="this.style.display='none'" alt="">`:'&#128206;';
    c.innerHTML=`${thumb}<span class="chip-name">${esc(f.name)}</span><button onclick="removeFile(${i})">&times;</button>`;
    $fileChips.appendChild(c);
  });
}
function removeFile(i){pendingFiles.splice(i,1);renderFileChips();}
document.addEventListener('dragover',e=>{e.preventDefault();$uploadZone.classList.add('active','dragover');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget||e.relatedTarget===document.documentElement)$uploadZone.classList.remove('dragover');});
document.addEventListener('drop',e=>{e.preventDefault();$uploadZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFileSelect(e.dataTransfer.files);});

// Send (SSE)
async function sendMessage(){
  const text=$input.value.trim();if(!text||isStreaming)return;
  addMessage('user',text);chatHistory.push({role:'user',content:text});
  $input.value='';autoResize($input);
  const fileIds=pendingFiles.map(f=>f.id);pendingFiles=[];renderFileChips();
  isStreaming=true;$('btnSend').disabled=true;
  const body={message:text,file_ids:fileIds};if(currentThreadId)body.thread_id=currentThreadId;
  try{
    const res=await fetch('/api/agent/chat',{method:'POST',headers:hdrs({'Content-Type':'application/json'}),body:JSON.stringify(body)});
    if(!res.ok){const err=await res.json().catch(()=>({}));addMessage('agent','Error: '+(err.detail||res.status));return;}
    const reader=res.body.getReader(),dec=new TextDecoder();
    let buf='',streamBubble=null,streamText='',activeCard=null;
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();
      let evt='';
      for(const line of lines){
        if(line.startsWith('event: '))evt=line.slice(7).trim();
        else if(line.startsWith('data: ')&&evt){handleEvt(evt,JSON.parse(line.slice(6)));evt='';}
      }
    }
    function handleEvt(ev,d){
      switch(ev){
        case'thread':currentThreadId=d.thread_id;$chatTitle.textContent=d.thread_id.slice(0,12)+'...';break;
        case'token':if(!streamBubble)streamBubble=addStreamingBubble();streamText+=d.content;streamBubble.innerHTML=renderMd(streamText);scrollBottom();break;
        case'tool_start':if(streamBubble&&streamText){streamBubble.innerHTML=renderMd(streamText);streamBubble.parentElement.dataset.text=streamText;chatHistory.push({role:'agent',content:streamText});streamBubble=null;streamText='';}activeCard=addToolCard(d.tool,d.args,'',[]  ,null,false);break;
        case'tool_progress':if(activeCard){const s=activeCard.querySelector('.tc-status');if(s){const pct=d.percent!=null?` ${d.percent}%`:'';const msg=d.message?` — ${d.message}`:'';s.textContent=`Running...${pct}${msg} ${d.elapsed_seconds||''}s`;}}break;
        case'tool_end':if(activeCard){const p=activeCard.parentElement||$messages;const nc=document.createElement('div');nc.className='tool-card';const ae=activeCard.querySelector('.tc-args');const at=ae?ae.textContent:'';let fh='';if(d.files&&d.files.length)fh='<div class="tc-files">'+d.files.map(f=>`<a href="${f}" download>&#128196; ${f.split('/').pop()}</a>`).join('')+'</div>';const st=d.elapsed_seconds!=null?`Done (${d.elapsed_seconds}s)`:'Done';nc.innerHTML=`<div class="tc-header" onclick="this.parentElement.classList.toggle('expanded')"><div class="tc-icon">T</div><span class="tc-name">${esc(d.tool)}</span><span class="tc-status">${st}</span><span class="tc-chevron">&#9654;</span></div><div class="tc-body">${at?`<div class="tc-args-label">Args</div><div class="tc-args">${esc(at)}</div>`:''}${d.output?`<div class="tc-output-label">Output</div><div class="tc-output">${esc(d.output)}</div>`:''}${fh}</div>`;$messages.replaceChild(nc,activeCard);activeCard=null;chatHistory.push({role:'tool',name:d.tool,content:d.output});}break;
        case'error':addMessage('agent','Error: '+d.message);break;
        case'done':if(streamBubble&&streamText){streamBubble.innerHTML=renderMd(streamText);streamBubble.parentElement.dataset.text=streamText;chatHistory.push({role:'agent',content:streamText});}break;
      }
    }
  }catch(e){addMessage('agent','Connection error: '+e.message);}
  finally{isStreaming=false;$('btnSend').disabled=false;loadThreads();}
}

// Search / filter
function filterMessages(q){
  const msgs=$messages.querySelectorAll('.msg, .tool-card');
  msgs.forEach(el=>{
    if(!q){el.classList.remove('hidden');const b=el.querySelector('.msg-bubble');if(b&&el.dataset.text)b.innerHTML=renderMd(el.dataset.text);return;}
    const t=(el.dataset.text||el.textContent||'').toLowerCase();
    if(t.includes(q.toLowerCase())){el.classList.remove('hidden');const b=el.querySelector('.msg-bubble');if(b&&el.dataset.text)b.innerHTML=highlightMd(el.dataset.text,q);}
    else el.classList.add('hidden');
  });
}
function highlightMd(text,q){let html=renderMd(text);const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');return html.replace(re,'<mark>$1</mark>');}

// Export
function exportChat(fmt){
  if(!chatHistory.length){alert('No messages to export');return;}
  let content,filename,mime;
  if(fmt==='json'){content=JSON.stringify({thread_id:currentThreadId,messages:chatHistory},null,2);filename='chat.json';mime='application/json';}
  else{content=chatHistory.map(m=>{if(m.role==='user')return`**User:** ${m.content}`;if(m.role==='agent')return`**Agent:** ${m.content}`;return`**Tool (${m.name}):** ${m.content}`;}).join('\n\n---\n\n');filename='chat.md';mime='text/markdown';}
  const blob=new Blob([content],{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

// Helpers
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function toggleSidebar(){$('sidebar').classList.toggle('open');}
function renderMd(t){if(!t)return'';let h=esc(t);h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c}</code></pre>`);h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');h=h.replace(/\n\n+/g,'</p><p>');h=h.replace(/\n/g,'<br>');return'<p>'+h+'</p>';}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Workflows
async function loadWorkflows(){
  try{
    const d=await api('/api/workflows');
    const bar=$('workflowBar');
    (d.workflows||[]).forEach(w=>{
      const btn=document.createElement('button');
      btn.className='wf-btn';
      btn.textContent=w.name;
      btn.title=w.description;
      btn.onclick=()=>applyWorkflow(w);
      bar.appendChild(btn);
    });
  }catch{}
}
async function applyWorkflow(w){
  if(!w.params||w.params.length===0){
    // No params needed, just set the prompt
    $input.value=w.prompt_template;
    autoResize($input);
    $input.focus();
    return;
  }
  // Collect params via prompts
  const values={};
  for(const p of w.params){
    const val=prompt(`${p.label}${p.default?' (default: '+p.default+')':''}:`,p.default||'');
    if(val===null)return;
    values[p.name]=val||p.default||'';
  }
  try{
    const d=await api(`/api/workflows/${w.id}/render`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({workflow_id:w.id,params:values,file_ids:pendingFiles.map(f=>f.id)}),
    });
    $input.value=d.prompt;
    autoResize($input);
    $input.focus();
  }catch(e){alert('Workflow error: '+e.message);}
}

// Init
loadThreads();loadWorkflows();$input.focus();
</script>
