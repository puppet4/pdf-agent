<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--bg-sidebar:#fff;--bg-input:#fff;
  --bg-user:#4f46e5;--bg-agent:#fff;--bg-tool:#f1f5f9;
  --text:#1e293b;--text-secondary:#64748b;--text-user:#fff;--text-agent:#1e293b;
  --border:#e2e8f0;--accent:#4f46e5;--accent-hover:#4338ca;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",monospace;
}
[data-theme="dark"]{
  --bg:#0f172a;--bg-sidebar:#1e293b;--bg-input:#1e293b;
  --bg-user:#4f46e5;--bg-agent:#1e293b;--bg-tool:#0f172a;
  --text:#e2e8f0;--text-secondary:#94a3b8;--text-user:#fff;--text-agent:#e2e8f0;
  --border:#334155;--accent:#818cf8;--accent-hover:#6366f1;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--bg)}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit;background:var(--bg-input);color:var(--text)}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Sidebar */
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sidebar-header h2{font-size:15px;font-weight:600;flex:1}
.btn-new{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:background .15s}
.btn-new:hover{background:var(--accent-hover)}
.btn-icon{background:none;border:1px solid var(--border);color:var(--text-secondary);width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}

.search-bar{padding:8px 10px;border-bottom:1px solid var(--border)}
.search-bar input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;outline:none;background:var(--bg);color:var(--text)}
.search-bar input:focus{border-color:var(--accent)}

.thread-list{flex:1;overflow-y:auto;padding:6px}
.thread-item{padding:9px 11px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:2px;transition:background .1s}
.thread-item:hover{background:var(--bg-tool)}
.thread-item.active{background:#eef2ff;color:var(--accent)}
[data-theme="dark"] .thread-item.active{background:#1e1b4b}
.thread-item .ti-text{flex:1;min-width:0}
.thread-item .ti-id{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread-item .ti-meta{font-size:11px;color:var(--text-secondary)}
.thread-item .ti-del{opacity:0;background:none;border:none;color:#ef4444;font-size:16px;padding:2px 4px;border-radius:4px;transition:opacity .15s;flex-shrink:0}
.thread-item:hover .ti-del{opacity:.6}
.thread-item .ti-del:hover{opacity:1;background:#fee2e2}

/* Chat header */
.chat-header{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--bg-sidebar);display:flex;align-items:center;gap:10px;min-height:50px}
.chat-header h3{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-actions{display:flex;gap:6px}

/* PDF page previewer */
.page-previewer{border-top:1px solid var(--border);padding:10px;flex-shrink:0;display:none}
.page-previewer.open{display:block}
.page-previewer h4{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.page-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.page-strip::-webkit-scrollbar{height:3px}
.page-thumb{flex-shrink:0;border:2px solid transparent;border-radius:4px;cursor:pointer;transition:border-color .15s;overflow:hidden}
.page-thumb:hover,.page-thumb.selected{border-color:var(--accent)}
.page-thumb img{display:block;width:52px;height:70px;object-fit:cover;background:var(--bg-tool)}
.page-thumb .pg-num{font-size:9px;text-align:center;color:var(--text-secondary);padding:2px 0}
.page-range-hint{font-size:11px;color:var(--accent);margin-top:5px;font-weight:500}

/* page_range helper in tool runner */
.pr-helper{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
.pr-chip{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:12px;cursor:pointer;color:var(--text-secondary);transition:all .15s;background:none}
.pr-chip:hover,.pr-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(79,70,229,.06)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:80%;display:flex;flex-direction:column;gap:4px;animation:fadeIn .2s ease}
.msg.hidden{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end}
.msg.agent{align-self:flex-start}
.msg-bubble{padding:10px 14px;border-radius:var(--radius);line-height:1.55;font-size:14px;word-break:break-word;box-shadow:var(--shadow)}
.msg.user .msg-bubble{background:var(--bg-user);color:var(--text-user);border-bottom-right-radius:4px}
.msg.agent .msg-bubble{background:var(--bg-agent);color:var(--text-agent);border-bottom-left-radius:4px}
.msg-bubble p{margin:0 0 8px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble code{font-family:var(--mono);font-size:12px;background:rgba(0,0,0,.08);padding:1px 4px;border-radius:3px}
.msg-bubble pre{background:#1e293b;color:#e2e8f0;padding:12px;border-radius:var(--radius-sm);overflow-x:auto;margin:8px 0;font-size:12px}
.msg-bubble pre code{background:none;padding:0;color:inherit}
.msg-bubble a{color:var(--accent);text-decoration:underline}
.msg.user .msg-bubble code{background:rgba(255,255,255,.2)}
mark{background:rgba(255,220,0,.4);border-radius:2px;padding:0 1px}

/* Tool cards */
.tool-card{background:var(--bg-tool);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;max-width:80%;align-self:flex-start;animation:fadeIn .2s ease}
.tool-card .tc-header{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.tool-card .tc-icon{width:20px;height:20px;background:var(--accent);color:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tool-card .tc-name{font-weight:600;flex:1}
.tool-card .tc-status{font-size:11px;color:var(--text-secondary)}
.tool-card .tc-chevron{color:var(--text-secondary);transition:transform .15s;font-size:12px}
.tool-card.expanded .tc-chevron{transform:rotate(90deg)}
.tool-card .tc-body{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.tool-card.expanded .tc-body{display:block}
.tool-card .tc-args,.tool-card .tc-output{font-family:var(--mono);font-size:12px;white-space:pre-wrap;color:var(--text-secondary);margin:4px 0}
.tool-card .tc-args-label,.tool-card .tc-output-label{font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tool-card .tc-files{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
.tool-card .tc-files a{display:inline-flex;align-items:center;gap:4px;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--accent);text-decoration:none;transition:border-color .15s}
.tool-card .tc-files a:hover{border-color:var(--accent)}

.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-bar .progress-fill{height:100%;background:var(--accent);border-radius:2px;animation:indeterminate 1.5s ease-in-out infinite}
@keyframes indeterminate{0%{width:0;margin-left:0}50%{width:40%;margin-left:30%}100%{width:0;margin-left:100%}}

/* Input area */
.input-area{padding:12px 18px 14px;border-top:1px solid var(--border);background:var(--bg-sidebar)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:8px;transition:all .15s;display:none}
.upload-zone.active{display:block}
.upload-zone.dragover{border-color:var(--accent);background:rgba(79,70,229,.05)}
.file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.2);color:var(--accent);padding:3px 6px 3px 3px;border-radius:8px;font-size:12px}
.file-chip img{width:28px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--border)}
.file-chip .chip-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip button{background:none;border:none;color:var(--accent);font-size:14px;line-height:1;padding:0 2px}

/* Workflow selector */
.workflow-bar{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;overflow-x:auto;flex-shrink:0}
.workflow-bar::-webkit-scrollbar{height:3px}
.wf-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text-secondary);white-space:nowrap;transition:all .15s;flex-shrink:0}
.wf-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,70,229,.05)}
.wf-label{font-size:11px;color:var(--text-secondary);flex-shrink:0;font-weight:500}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;line-height:1.4;max-height:120px;outline:none;transition:border-color .15s;background:var(--bg-input);color:var(--text)}
.input-row textarea:focus{border-color:var(--accent)}
.btn-send{background:var(--accent);color:#fff;border:none;width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.btn-send:hover{background:var(--accent-hover)}
.btn-send:disabled{opacity:.5;cursor:not-allowed}
.btn-attach{background:none;border:1px solid var(--border);width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:border-color .15s;flex-shrink:0}
.btn-attach:hover{border-color:var(--accent);color:var(--accent)}

/* Tool runner panel */
.tool-runner{border-top:1px solid var(--border);padding:10px;flex-shrink:0}
.tool-runner h4{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.tool-runner select{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;font-size:13px;background:var(--bg-input);color:var(--text);outline:none;margin-bottom:6px}
.tool-runner .tr-params{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.tool-runner .tr-param label{font-size:11px;color:var(--text-secondary);margin-bottom:2px;display:block}
.tool-runner .tr-param input{width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;background:var(--bg-input);color:var(--text);outline:none}
.tool-runner .btn-run{width:100%;background:var(--accent);color:#fff;border:none;padding:7px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.tool-runner .btn-run:hover{background:var(--accent-hover)}
.tool-runner .btn-run:disabled{opacity:.5;cursor:not-allowed}
.tool-runner .tr-result{margin-top:8px;font-size:12px;color:var(--text-secondary);background:var(--bg-tool);border-radius:4px;padding:8px;display:none}
.tool-runner .tr-result.visible{display:block}
.tool-runner .tr-result a{color:var(--accent);display:block;margin-top:4px}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
.sidebar-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--text-secondary);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sidebar-tab:hover{color:var(--accent)}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-panel.active{display:flex}

/* File manager */
.file-manager{flex:1;overflow-y:auto;padding:6px}
.file-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:6px;background:var(--bg-sidebar)}
.file-item img{width:32px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0}
.file-item .fi-icon{width:32px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.file-item .fi-info{flex:1;min-width:0}
.file-item .fi-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item .fi-meta{font-size:11px;color:var(--text-secondary)}
.file-item .fi-actions{display:flex;gap:4px;flex-shrink:0}
.file-item .fi-btn{background:none;border:none;color:var(--text-secondary);padding:3px 5px;border-radius:4px;font-size:13px;cursor:pointer;transition:all .15s}
.file-item .fi-btn:hover{background:var(--bg-tool);color:var(--accent)}

/* Workflow manager */
.wf-manager{flex:1;overflow-y:auto;padding:6px}
.wf-item{padding:9px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:6px;background:var(--bg-sidebar)}
.wf-item .wi-header{display:flex;align-items:center;gap:6px}
.wf-item .wi-name{font-size:13px;font-weight:500;flex:1}
.wf-item .wi-badge{font-size:10px;padding:1px 6px;border-radius:8px;background:#e0e7ff;color:var(--accent)}
[data-theme="dark"] .wf-item .wi-badge{background:#1e1b4b}
.wf-item .wi-desc{font-size:11px;color:var(--text-secondary);margin-top:3px}
.wf-item .wi-actions{display:flex;gap:4px;margin-top:6px}
.wf-item .wi-btn{font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.wf-item .wi-btn:hover{border-color:var(--accent);color:var(--accent)}
.wf-item .wi-btn.use{background:var(--accent);color:#fff;border-color:var(--accent)}
.wf-item .wi-btn.use:hover{background:var(--accent-hover)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-sidebar);border-radius:var(--radius);padding:20px;width:480px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal label{font-size:13px;font-weight:500;display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;background:var(--bg-input);color:var(--text);outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{min-height:80px;resize:vertical}
.modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modal .btn-cancel{background:none;border:1px solid var(--border);padding:6px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;color:var(--text-secondary)}
.modal .btn-save{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer}
.empty-state .es-icon{font-size:48px;opacity:.3}
.empty-state h3{font-size:18px;color:var(--text);font-weight:600}
.empty-state p{font-size:14px;text-align:center;max-width:360px;line-height:1.5}

/* Batch run */
.batch-bar{border-top:1px solid var(--border);padding:8px 10px;background:rgba(79,70,229,.04);display:none;align-items:center;gap:8px;font-size:12px;flex-shrink:0}
.batch-bar.open{display:flex}
.batch-bar .bb-count{flex:1;color:var(--text-secondary)}
.batch-bar .btn-batch{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;transition:background .15s}
.batch-bar .btn-batch:hover{background:var(--accent-hover)}
.batch-bar .btn-clear{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer}
.file-item .fi-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
/* Continue processing button on tool cards */
.tc-continue{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.tc-continue button{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid var(--accent);color:var(--accent);background:none;cursor:pointer;transition:all .15s}
.tc-continue button:hover{background:var(--accent);color:#fff}

/* Responsive */
@media(max-width:768px){
  .sidebar{position:absolute;left:-280px;z-index:10;height:100%;transition:left .2s}
  .sidebar.open{left:0}
  .menu-toggle{display:block!important}
}
.menu-toggle{display:none;background:none;border:none;font-size:20px;padding:4px 8px;color:var(--text)}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#9ca3af}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:#475569}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 id="appTitle">PDF Agent</h2>
      <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" title="Dark mode">&#9790;</button>
      <button class="btn-new" onclick="newChat()" id="btnNew">+ New</button>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" onclick="switchTab('chat',this)">&#128172; Chat</button>
      <button class="sidebar-tab" onclick="switchTab('files',this)">&#128196; Files</button>
      <button class="sidebar-tab" onclick="switchTab('workflows',this)">&#9889; Workflows</button>
    </div>

    <!-- Chat tab -->
    <div class="tab-panel active" id="tab-chat">
      <div class="search-bar"><input id="searchInput" placeholder="Search messages..." oninput="filterMessages(this.value)"></div>
      <div class="thread-list" id="threadList"></div>
    </div>

    <!-- Files tab -->
    <div class="tab-panel" id="tab-files">
      <div style="padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
        <label style="flex:1;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent)">
          <input type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.doc,.docx" style="display:none" onchange="uploadAndRefreshFiles(this.files)">
          &#8679; Upload file
        </label>
        <button class="btn-icon" onclick="loadFileManager()" title="Refresh">&#8635;</button>
      </div>
      <div class="file-manager" id="fileManager"><div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px">Loading files...</div></div>
      <!-- Batch run bar -->
      <div class="batch-bar" id="batchBar">
        <span class="bb-count" id="batchCount">0 files selected</span>
        <button class="btn-clear" onclick="clearBatchSelection()">Clear</button>
        <button class="btn-batch" onclick="openBatchRun()">&#9889; Batch Run</button>
      </div>
      <!-- Direct tool runner -->
      <div class="tool-runner" id="toolRunner">
        <h4>&#9889; Run Tool</h4>
        <select id="trToolSelect" onchange="onToolSelect()"><option value="">Select a tool...</option></select>
        <div class="tr-params" id="trParams"></div>
        <button class="btn-run" id="btnRun" onclick="runToolDirect()" disabled>Run on selected file</button>
        <div class="tr-result" id="trResult"></div>
      </div>
    </div>

    <!-- Workflows tab -->
    <div class="tab-panel" id="tab-workflows">
      <div style="padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center">
        <span style="flex:1;font-size:13px;color:var(--text-secondary)">Workflow templates</span>
        <button class="btn-icon" onclick="openWorkflowModal()" title="Create workflow">+</button>
      </div>
      <div class="wf-manager" id="wfManager"></div>
    </div>
  </aside>
  <div class="main">
    <div class="chat-header">
      <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
      <h3 id="chatTitle">New Chat</h3>
      <div class="header-actions">
        <a href="/static/tools.html" class="btn-icon" title="Tool Library" style="display:flex;align-items:center;justify-content:center;text-decoration:none">&#128295;</a>
        <button class="btn-icon" onclick="exportChat('md')" title="Export Markdown">&#8681;</button>
        <button class="btn-icon" onclick="exportChat('json')" title="Export JSON">{ }</button>
      </div>
    </div>

    <!-- Page previewer (shown after uploading a PDF) -->
    <div class="page-previewer" id="pagePreviewer">
      <h4 id="previewerTitle">Pages</h4>
      <div class="page-strip" id="pageStrip"></div>
      <div class="page-range-hint" id="pageRangeHint"></div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="es-icon">&#128196;</div>
        <h3 id="emptyTitle">PDF Agent Toolbox</h3>
        <p id="emptyDesc">Upload a PDF and tell me what you'd like to do. I can rotate, merge, split, compress, watermark, OCR, and much more.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="workflow-bar" id="workflowBar"><span class="wf-label">&#9889;</span></div>
      <div class="upload-zone" id="uploadZone">Drop files here or <label style="color:var(--accent);cursor:pointer;text-decoration:underline"><input type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none" onchange="handleFileSelect(this.files)">browse</label></div>
      <div class="file-chips" id="fileChips"></div>
      <div class="input-row">
        <button class="btn-attach" onclick="toggleUpload()" title="Attach files">&#128206;</button>
        <textarea id="msgInput" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()" title="Send">&#10148;</button>
      </div>
    </div>
  </div>
</div>
<script>
// State
let currentThreadId = null, pendingFiles = [], isStreaming = false, chatHistory = [];
let apiKey = localStorage.getItem('pdf_agent_api_key') || '';
const $ = id => document.getElementById(id);
const $messages = $('messages'), $input = $('msgInput'), $threadList = $('threadList');
const $emptyState = $('emptyState'), $fileChips = $('fileChips'), $chatTitle = $('chatTitle');
const $uploadZone = $('uploadZone');

// API
function hdrs(extra={}) { const h={...extra}; if(apiKey) h['X-API-Key']=apiKey; return h; }
async function api(path,opts={}) { opts.headers=hdrs(opts.headers||{}); const r=await fetch(path,opts); if(!r.ok){const b=await r.json().catch(()=>({}));throw new Error(b.detail||`HTTP ${r.status}`);}return r.json();}

// Theme
function toggleTheme() {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('pdf_agent_theme', t);
  $('themeBtn').innerHTML = t==='dark' ? '&#9788;' : '&#9790;';
  $('themeBtn').title = t==='dark' ? 'Light mode' : 'Dark mode';
}
(function(){const t=localStorage.getItem('pdf_agent_theme');if(t){document.documentElement.dataset.theme=t;if(t==='dark')$('themeBtn').innerHTML='&#9788;';}})();

// Threads
async function loadThreads(){try{const d=await api('/api/agent/threads');renderThreadList(d.threads||[]);}catch{}}
function renderThreadList(threads){
  $threadList.innerHTML='';
  threads.forEach(t=>{const el=document.createElement('div');el.className='thread-item'+(t.thread_id===currentThreadId?' active':'');
    const s=t.thread_id.slice(0,8),d=new Date(t.updated_at*1000).toLocaleString();
    el.innerHTML=`<div class="ti-text" onclick="openThread('${t.thread_id}')"><div class="ti-id">${s}...</div><div class="ti-meta">${d}</div></div><button class="ti-del" onclick="event.stopPropagation();deleteThread('${t.thread_id}')" title="Delete">&times;</button>`;
    $threadList.appendChild(el);});
}
async function openThread(tid){
  currentThreadId=tid;$chatTitle.textContent=tid.slice(0,12)+'...';clearMessages();chatHistory=[];
  try{const d=await api(`/api/agent/threads/${tid}`);
    (d.messages||[]).forEach(m=>{
      if(m.type==='human'){addMessage('user',m.content);chatHistory.push({role:'user',content:m.content});}
      else if(m.type==='ai'&&m.content){addMessage('agent',m.content);chatHistory.push({role:'agent',content:m.content});}
      else if(m.type==='tool'&&m.content){addToolCard(m.name||'tool',{},m.content,[],null,true);chatHistory.push({role:'tool',name:m.name,content:m.content});}
    });
  }catch(e){addMessage('agent','Failed to load: '+e.message);}
  loadThreads();
}
async function deleteThread(tid){if(!confirm('Delete this thread?'))return;try{await api(`/api/agent/threads/${tid}`,{method:'DELETE'});if(currentThreadId===tid)newChat();loadThreads();}catch(e){alert(e.message);}}
function newChat(){currentThreadId=null;$chatTitle.textContent='New Chat';pendingFiles=[];renderFileChips();clearMessages();chatHistory=[];$emptyState.style.display='';hidePagePreviewer();loadThreads();}

// Messages
function clearMessages(){$messages.innerHTML='';$emptyState.style.display='';$messages.appendChild($emptyState);}
function addMessage(role,content){
  $emptyState.style.display='none';
  const msg=document.createElement('div');msg.className='msg '+role;msg.dataset.text=content;
  const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.innerHTML=renderMd(content);
  msg.appendChild(bubble);$messages.appendChild(msg);scrollBottom();return bubble;
}
function addStreamingBubble(){
  $emptyState.style.display='none';
  const msg=document.createElement('div');msg.className='msg agent';
  const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.id='streaming-bubble';
  msg.appendChild(bubble);$messages.appendChild(msg);scrollBottom();return bubble;
}
function addToolCard(name,args,output,files,elapsed,done){
  $emptyState.style.display='none';
  const card=document.createElement('div');card.className='tool-card'+(done?' expanded':'');
  let argsStr='';if(args&&Object.keys(args).length)argsStr=Object.entries(args).map(([k,v])=>`${k}: ${JSON.stringify(v)}`).join('\n');
  let filesHtml='';if(files&&files.length)filesHtml='<div class="tc-files">'+files.map(f=>{const n=f.split('/').pop();return`<a href="${f}" download>&#128196; ${n}</a>`;}).join('')+'</div>';
  const st=done?(elapsed!=null?`Done (${elapsed}s)`:'Done'):'Running...';
  card.innerHTML=`<div class="tc-header" onclick="this.parentElement.classList.toggle('expanded')"><div class="tc-icon">T</div><span class="tc-name">${esc(name)}</span><span class="tc-status">${st}</span><span class="tc-chevron">&#9654;</span></div><div class="tc-body">${argsStr?`<div class="tc-args-label">Args</div><div class="tc-args">${esc(argsStr)}</div>`:''}${output?`<div class="tc-output-label">Output</div><div class="tc-output">${esc(output)}</div>`:''}${filesHtml}</div>${!done?'<div class="progress-bar"><div class="progress-fill"></div></div>':''}`;
  $messages.appendChild(card);scrollBottom();return card;
}
function scrollBottom(){requestAnimationFrame(()=>{$messages.scrollTop=$messages.scrollHeight;});}

// File upload
function toggleUpload(){$uploadZone.classList.toggle('active');}
async function handleFileSelect(fl){for(const f of fl){try{const fd=new FormData();fd.append('file',f);const r=await fetch('/api/files',{method:'POST',body:fd,headers:hdrs()});if(!r.ok)throw new Error('Upload failed');const d=await r.json();pendingFiles.push({id:d.id,name:d.orig_name,mime:d.mime_type,page_count:d.page_count});renderFileChips();
// Show page previewer for PDF uploads
if(d.mime_type==='application/pdf'&&d.page_count>1){showPagePreviewer(d.id,d.orig_name,d.page_count);}
}catch(e){alert('Upload error: '+e.message);}}$uploadZone.classList.remove('active');}
function renderFileChips(){
  $fileChips.innerHTML='';
  pendingFiles.forEach((f,i)=>{
    const c=document.createElement('span');c.className='file-chip';
    const thumb=f.mime==='application/pdf'?`<img src="/api/files/${f.id}/thumbnail" onerror="this.style.display='none'" alt="">`:'&#128206;';
    c.innerHTML=`${thumb}<span class="chip-name">${esc(f.name)}</span><button onclick="removeFile(${i})">&times;</button>`;
    $fileChips.appendChild(c);
  });
}
function removeFile(i){pendingFiles.splice(i,1);renderFileChips();}
document.addEventListener('dragover',e=>{e.preventDefault();$uploadZone.classList.add('active','dragover');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget||e.relatedTarget===document.documentElement)$uploadZone.classList.remove('dragover');});
document.addEventListener('drop',e=>{e.preventDefault();$uploadZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFileSelect(e.dataTransfer.files);});

// Send (SSE)
async function sendMessage(){
  const text=$input.value.trim();if(!text||isStreaming)return;
  addMessage('user',text);chatHistory.push({role:'user',content:text});
  $input.value='';autoResize($input);
  const fileIds=pendingFiles.map(f=>f.id);pendingFiles=[];renderFileChips();
  isStreaming=true;$('btnSend').disabled=true;
  const body={message:text,file_ids:fileIds};if(currentThreadId)body.thread_id=currentThreadId;
  try{
    const res=await fetch('/api/agent/chat',{method:'POST',headers:hdrs({'Content-Type':'application/json'}),body:JSON.stringify(body)});
    if(!res.ok){const err=await res.json().catch(()=>({}));addMessage('agent','Error: '+(err.detail||res.status));return;}
    const reader=res.body.getReader(),dec=new TextDecoder();
    let buf='',streamBubble=null,streamText='',activeCard=null;
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();
      let evt='';
      for(const line of lines){
        if(line.startsWith('event: '))evt=line.slice(7).trim();
        else if(line.startsWith('data: ')&&evt){handleEvt(evt,JSON.parse(line.slice(6)));evt='';}
      }
    }
    function handleEvt(ev,d){
      switch(ev){
        case'thread':currentThreadId=d.thread_id;$chatTitle.textContent=d.thread_id.slice(0,12)+'...';break;
        case'token':if(!streamBubble)streamBubble=addStreamingBubble();streamText+=d.content;streamBubble.innerHTML=renderMd(streamText);scrollBottom();break;
        case'tool_start':if(streamBubble&&streamText){streamBubble.innerHTML=renderMd(streamText);streamBubble.parentElement.dataset.text=streamText;chatHistory.push({role:'agent',content:streamText});streamBubble=null;streamText='';}activeCard=addToolCard(d.tool,d.args,'',[]  ,null,false);break;
        case'tool_progress':if(activeCard){const s=activeCard.querySelector('.tc-status');if(s){const pct=d.percent!=null?` ${d.percent}%`:'';const msg=d.message?` — ${d.message}`:'';s.textContent=`Running...${pct}${msg} ${d.elapsed_seconds||''}s`;}}break;
        case'tool_end':if(activeCard){const p=activeCard.parentElement||$messages;const nc=document.createElement('div');nc.className='tool-card';const ae=activeCard.querySelector('.tc-args');const at=ae?ae.textContent:'';let fh='';if(d.files&&d.files.length)fh='<div class="tc-files">'+d.files.map(f=>`<a href="${f}" download>&#128196; ${f.split('/').pop()}</a>`).join('')+'</div>';const st=d.elapsed_seconds!=null?`Done (${d.elapsed_seconds}s)`:'Done';
// Build "continue processing" quick actions
let continueHtml='';
if(d.files&&d.files.length){
  const suggestions=['compress','ocr','watermark_text','rotate','metadata_info'];
  continueHtml='<div class="tc-continue">'+suggestions.map(t=>`<button onclick="continueWithFile('${d.files[0]}','${t}')">${t}</button>`).join('')+'</div>';
}
nc.innerHTML=`<div class="tc-header" onclick="this.parentElement.classList.toggle('expanded')"><div class="tc-icon">T</div><span class="tc-name">${esc(d.tool)}</span><span class="tc-status">${st}</span><span class="tc-chevron">&#9654;</span></div><div class="tc-body">${at?`<div class="tc-args-label">Args</div><div class="tc-args">${esc(at)}</div>`:''}${d.output?`<div class="tc-output-label">Output</div><div class="tc-output">${esc(d.output)}</div>`:''}${fh}${continueHtml}</div>`;$messages.replaceChild(nc,activeCard);activeCard=null;chatHistory.push({role:'tool',name:d.tool,content:d.output});}break;
        case'error':addMessage('agent','Error: '+d.message);break;
        case'done':if(streamBubble&&streamText){streamBubble.innerHTML=renderMd(streamText);streamBubble.parentElement.dataset.text=streamText;chatHistory.push({role:'agent',content:streamText});}break;
      }
    }
  }catch(e){addMessage('agent','Connection error: '+e.message);}
  finally{isStreaming=false;$('btnSend').disabled=false;loadThreads();}
}

// Search / filter
function filterMessages(q){
  const msgs=$messages.querySelectorAll('.msg, .tool-card');
  msgs.forEach(el=>{
    if(!q){el.classList.remove('hidden');const b=el.querySelector('.msg-bubble');if(b&&el.dataset.text)b.innerHTML=renderMd(el.dataset.text);return;}
    const t=(el.dataset.text||el.textContent||'').toLowerCase();
    if(t.includes(q.toLowerCase())){el.classList.remove('hidden');const b=el.querySelector('.msg-bubble');if(b&&el.dataset.text)b.innerHTML=highlightMd(el.dataset.text,q);}
    else el.classList.add('hidden');
  });
}
function highlightMd(text,q){let html=renderMd(text);const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');return html.replace(re,'<mark>$1</mark>');}

// Export
function exportChat(fmt){
  if(!chatHistory.length){alert('No messages to export');return;}
  let content,filename,mime;
  if(fmt==='json'){content=JSON.stringify({thread_id:currentThreadId,messages:chatHistory},null,2);filename='chat.json';mime='application/json';}
  else{content=chatHistory.map(m=>{if(m.role==='user')return`**User:** ${m.content}`;if(m.role==='agent')return`**Agent:** ${m.content}`;return`**Tool (${m.name}):** ${m.content}`;}).join('\n\n---\n\n');filename='chat.md';mime='text/markdown';}
  const blob=new Blob([content],{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

// Helpers
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function toggleSidebar(){$('sidebar').classList.toggle('open');}
function renderMd(t){if(!t)return'';let h=esc(t);h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c}</code></pre>`);h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');h=h.replace(/\n\n+/g,'</p><p>');h=h.replace(/\n/g,'<br>');return'<p>'+h+'</p>';}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ---------------------------------------------------------------------------
// Batch Run
// ---------------------------------------------------------------------------
let _batchSelected = new Set(); // file IDs

function updateBatchBar() {
  const bar = $('batchBar');
  const count = _batchSelected.size;
  $('batchCount').textContent = `${count} file${count !== 1 ? 's' : ''} selected`;
  bar.classList.toggle('open', count > 0);
}

function toggleBatchFile(fileId, checked) {
  if (checked) _batchSelected.add(fileId);
  else _batchSelected.delete(fileId);
  updateBatchBar();
}

function clearBatchSelection() {
  _batchSelected.clear();
  document.querySelectorAll('.fi-check').forEach(cb => { cb.checked = false; });
  updateBatchBar();
}

async function openBatchRun() {
  if (_batchSelected.size === 0) return;
  const toolName = prompt('Enter tool name to run on all selected files (e.g. rotate, compress, ocr):');
  if (!toolName || !toolName.trim()) return;
  const tool = _allTools.find(t => t.name === toolName.trim());
  if (!tool) { alert(`Tool "${toolName}" not found`); return; }

  // Collect params via prompt for required params
  const params = {};
  if (tool.params) {
    for (const p of tool.params) {
      if (p.required) {
        const val = prompt(`${p.label}${p.options ? ' (' + p.options.join('/') + ')' : ''}:`, p.default || '');
        if (val === null) return;
        params[p.name] = val || p.default || '';
      } else if (p.default !== null && p.default !== undefined) {
        params[p.name] = p.default;
      }
    }
  }

  const fileIds = [..._batchSelected];
  const bar = $('batchBar');
  bar.querySelector('.btn-batch').disabled = true;
  bar.querySelector('.btn-batch').textContent = 'Running...';

  // Switch to chat tab and show progress
  switchTab('chat', document.querySelectorAll('.sidebar-tab')[0]);
  addMessage('agent', `&#9889; Running **${toolName}** on ${fileIds.length} file(s)...`);

  let success = 0, failed = 0;
  for (const fid of fileIds) {
    try {
      const d = await api(`/api/tools/${toolName}/run`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ file_ids: [fid], params }),
      });
      success++;
      const files = (d.output_files || []).map(f => `<a href="${f.download_url}" download style="color:var(--accent)">&#8681; ${esc(f.filename)}</a>`).join(' ');
      addMessage('agent', `File ${fid.slice(0, 8)}: ${esc(d.log || 'Done')}${files ? '<br>' + files : ''}`);
    } catch (e) {
      failed++;
      addMessage('agent', `File ${fid.slice(0, 8)}: Error — ${esc(e.message)}`);
    }
  }
  addMessage('agent', `Batch complete: ${success} succeeded, ${failed} failed.`);

  bar.querySelector('.btn-batch').disabled = false;
  bar.querySelector('.btn-batch').textContent = '&#9889; Batch Run';
  clearBatchSelection();
}

// ---------------------------------------------------------------------------
// PDF Page Previewer
// ---------------------------------------------------------------------------
let _previewFileId = null;
let _previewPageCount = 0;
let _selectedPages = new Set();

async function showPagePreviewer(fileId, fileName, pageCount) {
  _previewFileId = fileId;
  _previewPageCount = pageCount || 1;
  _selectedPages.clear();

  const $prev = $('pagePreviewer');
  const $strip = $('pageStrip');
  $('previewerTitle').textContent = `${fileName} — ${_previewPageCount} page${_previewPageCount > 1 ? 's' : ''}`;
  $strip.innerHTML = '';

  // Load first 10 pages lazily
  const limit = Math.min(_previewPageCount, 12);
  for (let i = 1; i <= limit; i++) {
    const thumb = document.createElement('div');
    thumb.className = 'page-thumb';
    thumb.dataset.page = i;
    thumb.onclick = () => togglePageSelection(thumb, i);
    thumb.innerHTML = `<img src="/api/files/${fileId}/pages/${i}" loading="lazy" onerror="this.style.display='none'"><div class="pg-num">${i}</div>`;
    $strip.appendChild(thumb);
  }
  if (_previewPageCount > 12) {
    $strip.innerHTML += `<div style="display:flex;align-items:center;font-size:11px;color:var(--text-secondary);padding:0 8px">+${_previewPageCount - 12} more pages</div>`;
  }

  $prev.classList.add('open');
  updatePageRangeHint();
}

function togglePageSelection(thumb, page) {
  if (_selectedPages.has(page)) {
    _selectedPages.delete(page);
    thumb.classList.remove('selected');
  } else {
    _selectedPages.add(page);
    thumb.classList.add('selected');
  }
  updatePageRangeHint();
}

function updatePageRangeHint() {
  const hint = $('pageRangeHint');
  if (_selectedPages.size === 0) {
    hint.textContent = 'Click pages to select, or use "all" for all pages';
  } else if (_selectedPages.size === _previewPageCount) {
    hint.textContent = 'Selected: all pages';
  } else {
    const sorted = [..._selectedPages].sort((a, b) => a - b);
    hint.textContent = `Selected: ${sorted.join(', ')} → page_range: "${sorted.join(',')}"`;
  }
}

function getSelectedPageRange() {
  if (_selectedPages.size === 0 || _selectedPages.size === _previewPageCount) return 'all';
  return [..._selectedPages].sort((a, b) => a - b).join(',');
}

function hidePagePreviewer() {
  $('pagePreviewer').classList.remove('open');
  _previewFileId = null;
  _previewPageCount = 0;
  _selectedPages.clear();
}

// ---------------------------------------------------------------------------
// Direct Tool Runner
// ---------------------------------------------------------------------------
let _allTools = [];
let _selectedFileForTool = null;

async function loadToolList() {
  try {
    const d = await api('/api/tools');
    _allTools = d.tools || [];
    const sel = $('trToolSelect');
    while (sel.options.length > 1) sel.remove(1);
    _allTools.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.name; opt.textContent = t.label || t.name;
      sel.appendChild(opt);
    });
  } catch {}
}

function onToolSelect() {
  const toolName = $('trToolSelect').value;
  const $params = $('trParams');
  $params.innerHTML = '';
  $('trResult').className = 'tr-result';
  if (!toolName) { $('btnRun').disabled = true; return; }
  const tool = _allTools.find(t => t.name === toolName);
  if (tool && tool.params) {
    tool.params.forEach(p => {
      const div = document.createElement('div');
      div.className = 'tr-param';
      const opts = p.options ? p.options.join(', ') : '';
      div.innerHTML = `<label>${esc(p.label)}${p.required?' *':''}${opts?' ('+esc(opts)+')':''}</label>`;
      if (p.type === 'page_range') {
        // Visual page_range selector
        const defaultVal = _selectedPages.size > 0 ? getSelectedPageRange() : (p.default || 'all');
        div.innerHTML += `<input id="trp_${p.name}" type="text" value="${esc(defaultVal)}" placeholder="all, 1-3, odd, even">`;
        div.innerHTML += `<div class="pr-helper"><button class="pr-chip" onclick="setPR('trp_${p.name}','all')">all</button><button class="pr-chip" onclick="setPR('trp_${p.name}','odd')">odd</button><button class="pr-chip" onclick="setPR('trp_${p.name}','even')">even</button><button class="pr-chip" onclick="setPR('trp_${p.name}','1')">first</button>${_previewPageCount>0?'<button class="pr-chip" onclick="setPR(\'trp_'+p.name+'\',getSelectedPageRange())">use selected</button>':''}</div>`;
      } else if (p.options && p.options.length) {
        div.innerHTML += `<select id="trp_${p.name}" style="width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;background:var(--bg-input);color:var(--text)">${p.options.map(o=>`<option value="${esc(o)}"${o===p.default?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
      } else {
        div.innerHTML += `<input id="trp_${p.name}" type="text" value="${esc(p.default||'')}" placeholder="${esc(p.description||'')}">`;
      }
      $params.appendChild(div);
    });
  }
  $('btnRun').disabled = !_selectedFileForTool;
}

function setPR(inputId, value) {
  const el = document.getElementById(inputId);
  if (el) el.value = value;
}

async function continueWithFile(downloadUrl, toolName) {
  // Extract thread_id and step/filename from URL like /api/agent/threads/{id}/files/{step}/{file}
  const parts = downloadUrl.split('/');
  // URL: /api/agent/threads/TID/files/STEP/FILE
  const tidIdx = parts.indexOf('threads');
  const threadId = tidIdx >= 0 ? parts[tidIdx + 1] : null;

  const msg = `Apply ${toolName} to the output file from the previous step.`;
  $input.value = msg;
  if (threadId) currentThreadId = threadId;
  autoResize($input);
  $input.focus();
}

function selectFileForTool(fileId, fileName) {
  _selectedFileForTool = fileId;
  const h4 = document.querySelector('.tool-runner h4');
  if (h4) h4.textContent = `\u26A1 Run Tool on: ${fileName.length > 20 ? fileName.slice(0,18)+'...' : fileName}`;
  if ($('trToolSelect').value) $('btnRun').disabled = false;
}

async function runToolDirect() {
  const toolName = $('trToolSelect').value;
  if (!toolName || !_selectedFileForTool) return;
  const tool = _allTools.find(t => t.name === toolName);
  const params = {};
  if (tool && tool.params) {
    tool.params.forEach(p => {
      const el = document.getElementById('trp_' + p.name);
      if (el && el.value) params[p.name] = el.value;
    });
  }
  $('btnRun').disabled = true;
  $('btnRun').textContent = 'Running...';
  $('trResult').className = 'tr-result';
  try {
    const d = await api(`/api/tools/${toolName}/run`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ file_ids: [_selectedFileForTool], params }),
    });
    let html = `<strong>Done</strong> \u2014 ${esc(d.log||'')}`;
    if (d.output_files && d.output_files.length) {
      html += d.output_files.map(f => `<a href="${f.download_url}" download>&#8681; ${esc(f.filename)} (${(f.size_bytes/1024).toFixed(0)}KB)</a>`).join('');
    }
    $('trResult').innerHTML = html;
    $('trResult').className = 'tr-result visible';
  } catch (e) {
    $('trResult').innerHTML = `<span style="color:#ef4444">Error: ${esc(e.message)}</span>`;
    $('trResult').className = 'tr-result visible';
  }
  $('btnRun').disabled = false;
  $('btnRun').textContent = 'Run on selected file';
}

const _baseRenderFileManager = renderFileManager;
renderFileManager = function() {
  _baseRenderFileManager();
  document.querySelectorAll('.file-item').forEach((el, i) => {
    const f = _fileManagerFiles[i];
    if (!f) return;
    const btn = document.createElement('button');
    btn.className = 'fi-btn'; btn.title = 'Select for tool'; btn.textContent = '\u2713';
    btn.style.color = 'var(--accent)';
    btn.onclick = () => selectFileForTool(f.id, f.orig_name);
    el.querySelector('.fi-actions').prepend(btn);
  });
};

// Workflows
async function loadWorkflows(){
  try{
    const d=await api('/api/workflows');
    const bar=$('workflowBar');
    (d.workflows||[]).forEach(w=>{
      const btn=document.createElement('button');
      btn.className='wf-btn';
      btn.textContent=w.name;
      btn.title=w.description;
      btn.onclick=()=>applyWorkflow(w);
      bar.appendChild(btn);
    });
  }catch{}
}
async function applyWorkflow(w){
  if(!w.params||w.params.length===0){
    // No params needed, just set the prompt
    $input.value=w.prompt_template;
    autoResize($input);
    $input.focus();
    return;
  }
  // Collect params via prompts
  const values={};
  for(const p of w.params){
    const val=prompt(`${p.label}${p.default?' (default: '+p.default+')':''}:`,p.default||'');
    if(val===null)return;
    values[p.name]=val||p.default||'';
  }
  try{
    const d=await api(`/api/workflows/${w.id}/render`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({workflow_id:w.id,params:values,file_ids:pendingFiles.map(f=>f.id)}),
    });
    $input.value=d.prompt;
    autoResize($input);
    $input.focus();
  }catch(e){alert('Workflow error: '+e.message);}
}

// ---------------------------------------------------------------------------
// Tabs
// ---------------------------------------------------------------------------
function switchTab(name, btn) {
  document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'files') loadFileManager();
  if (name === 'workflows') loadWorkflowManager();
}

// ---------------------------------------------------------------------------
// File Manager
// ---------------------------------------------------------------------------
let _fileManagerFiles = [];

async function loadFileManager() {
  const $fm = $('fileManager');
  $fm.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px">Loading...</div>';
  try {
    const d = await api('/api/files');
    _fileManagerFiles = d.files || [];
    renderFileManager();
  } catch (e) {
    $fm.innerHTML = `<div style="padding:20px;text-align:center;color:#ef4444;font-size:13px">Error: ${esc(e.message)}</div>`;
  }
}

function renderFileManager() {
  const $fm = $('fileManager');
  if (!_fileManagerFiles.length) {
    $fm.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px">No files yet. Upload a file to get started.</div>';
    return;
  }
  $fm.innerHTML = '';
  _fileManagerFiles.forEach(f => {
    const el = document.createElement('div');
    el.className = 'file-item';
    const thumb = f.thumbnail_url
      ? `<img src="${f.thumbnail_url}" onerror="this.style.display='none'" alt="">`
      : `<div class="fi-icon">&#128196;</div>`;
    const size = f.size_bytes > 1048576 ? (f.size_bytes/1048576).toFixed(1)+'MB' : (f.size_bytes/1024).toFixed(0)+'KB';
    const pages = f.page_count ? ` · ${f.page_count}p` : '';
    const checked = _batchSelected.has(f.id) ? 'checked' : '';
    el.innerHTML = `<input type="checkbox" class="fi-check" ${checked} onchange="toggleBatchFile('${f.id}',this.checked)" title="Select for batch">
      ${thumb}
      <div class="fi-info">
        <div class="fi-name" title="${esc(f.orig_name)}">${esc(f.orig_name)}</div>
        <div class="fi-meta">${size}${pages}</div>
      </div>
      <div class="fi-actions">
        <button class="fi-btn" onclick="useFileInChat('${f.id}','${esc(f.orig_name)}','${f.mime_type}')" title="Use in chat">&#8599;</button>
        <a class="fi-btn" href="${f.download_url}" download title="Download">&#8681;</a>
        <button class="fi-btn" onclick="deleteFileFromManager('${f.id}')" title="Delete" style="color:#ef4444">&#128465;</button>
      </div>`;
    $fm.appendChild(el);
  });
}

async function uploadAndRefreshFiles(fileList) {
  for (const f of fileList) {
    try {
      const fd = new FormData();
      fd.append('file', f);
      await fetch('/api/files', { method: 'POST', body: fd, headers: hdrs() });
    } catch (e) { alert('Upload error: ' + e.message); }
  }
  loadFileManager();
}

async function deleteFileFromManager(fileId) {
  if (!confirm('Delete this file?')) return;
  try {
    await api(`/api/files/${fileId}`, { method: 'DELETE' });
    loadFileManager();
  } catch (e) { alert('Delete failed: ' + e.message); }
}

function useFileInChat(fileId, name, mime) {
  pendingFiles.push({ id: fileId, name, mime });
  renderFileChips();
  switchTab('chat', document.querySelectorAll('.sidebar-tab')[0]);
}

// ---------------------------------------------------------------------------
// Workflow Manager
// ---------------------------------------------------------------------------
let _editingWorkflowId = null;

async function loadWorkflowManager() {
  const $wm = $('wfManager');
  try {
    const d = await api('/api/workflows');
    $wm.innerHTML = '';
    (d.workflows || []).forEach(w => {
      const el = document.createElement('div');
      el.className = 'wf-item';
      const badge = w.builtin ? '<span class="wi-badge">built-in</span>' : '<span class="wi-badge" style="background:#dcfce7;color:#166534">custom</span>';
      el.innerHTML = `
        <div class="wi-header">
          <span class="wi-name">${esc(w.name)}</span>${badge}
        </div>
        <div class="wi-desc">${esc(w.description || '')}</div>
        <div class="wi-actions">
          <button class="wi-btn use" onclick="applyWorkflowById('${w.id}')">&#9889; Use</button>
          ${!w.builtin ? `<button class="wi-btn" onclick="editWorkflow('${w.id}')">Edit</button><button class="wi-btn" onclick="deleteWorkflowById('${w.id}')" style="color:#ef4444">Delete</button>` : ''}
        </div>`;
      $wm.appendChild(el);
    });
  } catch (e) {
    $wm.innerHTML = `<div style="padding:20px;text-align:center;color:#ef4444;font-size:13px">Error: ${esc(e.message)}</div>`;
  }
}

async function applyWorkflowById(wfId) {
  try {
    const w = await api(`/api/workflows/${wfId}`);
    await applyWorkflow(w);
    switchTab('chat', document.querySelectorAll('.sidebar-tab')[0]);
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteWorkflowById(wfId) {
  if (!confirm('Delete this workflow?')) return;
  try {
    await api(`/api/workflows/${wfId}`, { method: 'DELETE' });
    loadWorkflowManager();
  } catch (e) { alert('Delete failed: ' + e.message); }
}

function openWorkflowModal(wf = null) {
  _editingWorkflowId = wf ? wf.id : null;
  $('wfModalTitle').textContent = wf ? 'Edit Workflow' : 'Create Workflow';
  $('wfName').value = wf ? wf.name : '';
  $('wfDesc').value = wf ? (wf.description || '') : '';
  $('wfPrompt').value = wf ? wf.prompt_template : '';
  $('wfModal').classList.add('open');
}

function closeWorkflowModal() {
  $('wfModal').classList.remove('open');
  _editingWorkflowId = null;
}

async function editWorkflow(wfId) {
  try {
    const w = await api(`/api/workflows/${wfId}`);
    openWorkflowModal(w);
  } catch (e) { alert('Error: ' + e.message); }
}

async function saveWorkflow() {
  const name = $('wfName').value.trim();
  const prompt = $('wfPrompt').value.trim();
  if (!name || !prompt) { alert('Name and prompt template are required'); return; }
  const body = { name, description: $('wfDesc').value.trim(), prompt_template: prompt };
  try {
    if (_editingWorkflowId) {
      await api(`/api/workflows/${_editingWorkflowId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    } else {
      await api('/api/workflows', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    }
    closeWorkflowModal();
    loadWorkflowManager();
  } catch (e) { alert('Save failed: ' + e.message); }
}

$('wfModal').addEventListener('click', e => { if (e.target === $('wfModal')) closeWorkflowModal(); });

// Init
loadThreads();loadWorkflows();loadToolList();$input.focus();
</script>

<!-- Workflow create/edit modal -->
<div class="modal-overlay" id="wfModal">
  <div class="modal">
    <h3 id="wfModalTitle">Create Workflow</h3>
    <label>Name</label>
    <input id="wfName" placeholder="My workflow">
    <label>Description</label>
    <input id="wfDesc" placeholder="What does this workflow do?">
    <label>Prompt template</label>
    <textarea id="wfPrompt" placeholder="Use {param_name} for parameters. e.g. Rotate all pages by {angle} degrees."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeWorkflowModal()">Cancel</button>
      <button class="btn-save" onclick="saveWorkflow()">Save</button>
    </div>
  </div>
</div>
</body>
