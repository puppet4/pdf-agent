<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Toolbox</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 id="appTitle">PDF Toolbox</h2>
      <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" title="Dark mode">&#9790;</button>
      <button class="btn-new" onclick="newChat()" id="btnNew">+ New</button>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab" onclick="switchTab('chat',this)">&#128172; Chat</button>
      <button class="sidebar-tab active" onclick="switchTab('files',this)">&#128196; Files</button>
      <button class="sidebar-tab" onclick="switchTab('workflows',this)">&#9889; Workflows</button>
    </div>

    <!-- Chat tab -->
    <div class="tab-panel" id="tab-chat">
      <div class="search-bar"><input id="searchInput" placeholder="Search messages..." oninput="filterMessages(this.value)"></div>
      <div class="thread-list" id="threadList"></div>
    </div>

    <!-- Files tab -->
    <div class="tab-panel active" id="tab-files">
      <div style="padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
        <label style="flex:1;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent)">
          <input type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.doc,.docx" style="display:none" onchange="uploadAndRefreshFiles(this.files)">
          &#8679; Upload file
        </label>
        <button class="btn-icon" onclick="loadFileManager()" title="Refresh">&#8635;</button>
      </div>
      <div class="file-manager" id="fileManager"><div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px">Loading files...</div></div>
      <!-- Batch run bar -->
      <div class="batch-bar" id="batchBar">
        <span class="bb-count" id="batchCount">0 files selected</span>
        <button class="btn-clear" onclick="clearBatchSelection()">Clear</button>
        <button class="btn-batch" onclick="openBatchRun()">&#9889; Batch Run</button>
      </div>
      <!-- Direct tool runner -->
      <div class="tool-runner" id="toolRunner">
        <h4>&#9889; Run Tool</h4>
        <select id="trToolSelect" onchange="onToolSelect()"><option value="">Select a tool...</option></select>
        <div class="tr-params" id="trParams"></div>
        <button class="btn-run" id="btnRun" onclick="runToolDirect()" disabled>Run on selected file</button>
        <div class="tr-result" id="trResult"></div>
      </div>
      <!-- Run history -->
      <div class="history-panel" id="historyPanel">
        <h4>&#128196; Recent Runs <button onclick="loadHistory()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:10px;margin-left:4px">&#8635;</button></h4>
        <div id="historyList"><span style="color:var(--text-secondary);font-size:11px">No runs yet</span></div>
      </div>
    </div>

    <!-- Workflows tab -->
    <div class="tab-panel" id="tab-workflows">
      <div style="padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center">
        <span style="flex:1;font-size:13px;color:var(--text-secondary)">Workflow templates</span>
        <button class="btn-icon" onclick="openWorkflowModal()" title="Create workflow">+</button>
      </div>
      <div class="wf-manager" id="wfManager"></div>
    </div>
  </aside>
  <div class="main">
    <div class="chat-header">
      <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
      <h3 id="chatTitle">New Chat</h3>
      <div class="header-actions">
        <a href="/static/tools.html" class="btn-icon" title="Tool Library" style="display:flex;align-items:center;justify-content:center;text-decoration:none">&#128295;</a>
        <button class="btn-icon" onclick="exportChat('md')" title="Export Markdown">&#8681;</button>
        <button class="btn-icon" onclick="exportChat('json')" title="Export JSON">{ }</button>
      </div>
    </div>

    <!-- Page previewer (shown after uploading a PDF) -->
    <div class="page-previewer" id="pagePreviewer">
      <h4 id="previewerTitle">Pages</h4>
      <div class="page-strip" id="pageStrip"></div>
      <div class="page-range-hint" id="pageRangeHint"></div>
      <div style="margin-top:6px;display:flex;gap:6px;align-items:center">
        <button class="pr-chip" id="btnApplyReorder" style="display:none;border-color:var(--accent);color:var(--accent)" onclick="applyDragReorder()">&#8597; Apply reorder</button>
        <button class="pr-chip" onclick="hidePagePreviewer()" style="margin-left:auto">&#215; Close</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="es-icon">&#128196;</div>
        <h3 id="emptyTitle">PDF Toolbox</h3>
        <p id="emptyDesc">Upload a PDF and tell me what you'd like to do. I can rotate, merge, split, compress, watermark, OCR, and much more.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="workflow-bar" id="workflowBar"><span class="wf-label">&#9889;</span></div>
      <div class="upload-zone" id="uploadZone">Drop files here or <label style="color:var(--accent);cursor:pointer;text-decoration:underline"><input type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none" onchange="handleFileSelect(this.files)">browse</label></div>
      <div class="file-chips" id="fileChips"></div>
      <div class="input-row">
        <button class="btn-attach" onclick="toggleUpload()" title="Attach files">&#128206;</button>
        <textarea id="msgInput" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()" title="Send">&#10148;</button>
      </div>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>

<!-- Fullscreen page viewer -->
<div class="fullscreen-overlay" id="fsOverlay" onclick="if(event.target===this)closeFsView()">
  <button class="fs-close" onclick="closeFsView()">&#215;</button>
  <button class="fs-nav fs-prev" id="fsPrev" onclick="fsPrevPage()">&#8249;</button>
  <img id="fsImg" src="" alt="">
  <button class="fs-nav fs-next" id="fsNext" onclick="fsNextPage()">&#8250;</button>
  <span class="fs-info" id="fsInfo"></span>
</div>

<!-- Workflow create/edit modal -->
<div class="modal-overlay" id="wfModal">
  <div class="modal">
    <h3 id="wfModalTitle">Create Workflow</h3>
    <label>Name</label>
    <input id="wfName" placeholder="My workflow">
    <label>Description</label>
    <input id="wfDesc" placeholder="What does this workflow do?">
    <label>Prompt template</label>
    <textarea id="wfPrompt" placeholder="Use {param_name} for parameters. e.g. Rotate all pages by {angle} degrees."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeWorkflowModal()">Cancel</button>
      <button class="btn-save" onclick="saveWorkflow()">Save</button>
    </div>
  </div>
</div>
</body>
</html>
