<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Toolbox - Tools</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--bg-card:#fff;--text:#1e293b;--text-secondary:#64748b;
  --border:#e2e8f0;--accent:#4f46e5;--radius:12px;--radius-sm:8px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
[data-theme="dark"]{
  --bg:#0f172a;--bg-card:#1e293b;--text:#e2e8f0;--text-secondary:#94a3b8;
  --border:#334155;--accent:#818cf8;
}
html,body{font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh}

.navbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.navbar a{text-decoration:none;color:var(--text-secondary);font-size:13px;transition:color .15s}
.navbar a:hover{color:var(--accent)}
.navbar h1{font-size:16px;font-weight:700;color:var(--accent);flex:1}
.navbar .sep{color:var(--border)}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text-secondary);width:30px;height:30px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px}

.container{max-width:1100px;margin:0 auto;padding:24px 16px}

.hero{text-align:center;padding:32px 0 24px}
.hero h2{font-size:28px;font-weight:700;margin-bottom:8px}
.hero p{font-size:15px;color:var(--text-secondary);max-width:560px;margin:0 auto}

/* Filters */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.search-input{flex:1;min-width:180px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;background:var(--bg-card);color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}
.cat-btn{border:1px solid var(--border);background:none;border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--text-secondary);transition:all .15s;white-space:nowrap}
.cat-btn.active,.cat-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,70,229,.06)}

/* Tool count badge */
.tool-count{font-size:12px;color:var(--text-secondary);margin-left:auto}

/* Grid */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.tool-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s;cursor:default}
.tool-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(79,70,229,.12)}
.tool-card .tc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tool-card .tc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tool-card .tc-name{font-size:14px;font-weight:600;flex:1}
.tool-card .tc-cat{font-size:10px;padding:2px 8px;border-radius:10px;background:#f1f5f9;color:var(--text-secondary);border:1px solid var(--border)}
[data-theme="dark"] .tool-card .tc-cat{background:#0f172a}
.tool-card .tc-desc{font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:10px}
.tool-card .tc-params{display:flex;flex-wrap:wrap;gap:4px}
.tool-card .tc-param{font-size:11px;background:#eef2ff;color:var(--accent);padding:2px 7px;border-radius:4px}
[data-theme="dark"] .tool-card .tc-param{background:#1e1b4b}
.tool-card .tc-footer{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.tool-card .tc-engine{font-size:11px;color:var(--text-secondary)}
.tool-card .tc-async{font-size:10px;padding:1px 7px;border-radius:8px;background:#fef3c7;color:#92400e;border:1px solid #fde68a}
[data-theme="dark"] .tool-card .tc-async{background:#1c1a10;color:#fbbf24}
.tool-card .tc-btn{margin-left:auto;background:var(--accent);color:#fff;border:none;padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;text-decoration:none;transition:opacity .15s}
.tool-card .tc-btn:hover{opacity:.85}

/* Category icon map */
.cat-page_ops{background:#f0fdf4;color:#16a34a}
.cat-metadata{background:#eff6ff;color:#1d4ed8}
.cat-optimize{background:#fef3c7;color:#d97706}
.cat-convert{background:#fdf2f8;color:#9333ea}
.cat-annotation{background:#fef9c3;color:#854d0e}
.cat-forms{background:#f0f9ff;color:#0369a1}
.cat-analysis{background:#fdf4ff;color:#a21caf}
[data-theme="dark"] .cat-page_ops{background:#052e16;color:#4ade80}
[data-theme="dark"] .cat-metadata{background:#0c1a2e;color:#60a5fa}
[data-theme="dark"] .cat-optimize{background:#1c1507;color:#fbbf24}
[data-theme="dark"] .cat-convert{background:#1a0a1e;color:#c084fc}
[data-theme="dark"] .cat-annotation{background:#1a1400;color:#fde047}
[data-theme="dark"] .cat-forms{background:#03111c;color:#38bdf8}
[data-theme="dark"] .cat-analysis{background:#170520;color:#e879f9}

.empty{text-align:center;padding:48px;color:var(--text-secondary)}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:#475569}
</style>
</head>
<body>
<nav class="navbar">
  <h1>&#128196; PDF Toolbox</h1>
  <a href="/static/">&#128172; Chat</a>
  <span class="sep">|</span>
  <a href="/static/tools.html" style="color:var(--accent);font-weight:600">&#128295; Tools</a>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">&#9790;</button>
</nav>

<div class="container">
  <div class="hero">
    <h2>PDF Tool Library</h2>
    <p>38 tools for common PDF tasks, callable directly through the toolbox API.</p>
  </div>

  <div class="filter-bar">
    <input class="search-input" id="searchInput" placeholder="Search tools..." oninput="filterTools()">
    <button class="cat-btn active" data-cat="all" onclick="setCat('all',this)">All</button>
    <span class="tool-count" id="toolCount"></span>
  </div>

  <div class="tools-grid" id="toolsGrid"><div class="empty">Loading tools...</div></div>
</div>

<script>
const CAT_ICONS = {
  page_ops: '&#128196;', metadata: '&#128196;', optimize: '&#9889;',
  convert: '&#8644;', annotation: '&#9998;', forms: '&#128200;', analysis: '&#128269;',
};
const CAT_LABELS = {
  page_ops: 'Page Ops', metadata: 'Metadata', optimize: 'Optimize',
  convert: 'Convert', annotation: 'Annotate', forms: 'Forms', analysis: 'Analysis',
};

let _tools = [];
let _activeCat = 'all';

function toggleTheme(){
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('pdf_agent_theme', t);
  document.getElementById('themeBtn').innerHTML = t==='dark'?'&#9788;':'&#9790;';
}
(function(){const t=localStorage.getItem('pdf_agent_theme');if(t){document.documentElement.dataset.theme=t;if(t==='dark')document.getElementById('themeBtn').innerHTML='&#9788;';}})();

async function loadTools(){
  try{
    const resp = await fetch('/api/tools');
    const data = await resp.json();
    _tools = data.tools || [];
    buildCatButtons();
    renderTools();
  }catch(e){
    document.getElementById('toolsGrid').innerHTML = `<div class="empty">Failed to load tools: ${e.message}</div>`;
  }
}

function buildCatButtons(){
  const cats = [...new Set(_tools.map(t=>t.category))].sort();
  const bar = document.querySelector('.filter-bar');
  const countEl = document.getElementById('toolCount');
  cats.forEach(cat=>{
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = (CAT_ICONS[cat]||'&#128295;') + ' ' + (CAT_LABELS[cat]||cat);
    btn.onclick = () => setCat(cat, btn);
    bar.insertBefore(btn, countEl);
  });
}

function setCat(cat, btn){
  _activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTools();
}

function filterTools(){
  renderTools();
}

function renderTools(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('toolsGrid');
  const countEl = document.getElementById('toolCount');

  let filtered = _tools;
  if(_activeCat !== 'all') filtered = filtered.filter(t=>t.category===_activeCat);
  if(q) filtered = filtered.filter(t=>
    t.name.includes(q)||(t.label||'').toLowerCase().includes(q)||(t.description||'').toLowerCase().includes(q)
  );

  countEl.textContent = `${filtered.length} tool${filtered.length!==1?'s':''}`;

  if(!filtered.length){
    grid.innerHTML = '<div class="empty">No tools match your search</div>';
    return;
  }

  grid.innerHTML = '';
  filtered.forEach(t=>{
    const card = document.createElement('div');
    card.className = 'tool-card';
    const catClass = 'cat-'+(t.category||'page_ops');
    const icon = CAT_ICONS[t.category]||'&#128295;';
    const params = (t.params||[]).slice(0,4).map(p=>`<span class="tc-param">${esc(p.name)}</span>`).join('');
    const moreParams = t.params&&t.params.length>4?`<span class="tc-param">+${t.params.length-4} more</span>`:'';
    card.innerHTML = `
      <div class="tc-header">
        <div class="tc-icon ${catClass}">${icon}</div>
        <span class="tc-name">${esc(t.label||t.name)}</span>
        <span class="tc-cat">${esc(CAT_LABELS[t.category]||t.category||'')}</span>
      </div>
      <div class="tc-desc">${esc(t.description||'')}</div>
      ${params||moreParams?`<div class="tc-params">${params}${moreParams}</div>`:''}
      <div class="tc-footer">
        <span class="tc-engine">&#9881; ${esc(t.engine||'')}</span>
        ${t.async_hint?'<span class="tc-async">async</span>':''}
        <a class="tc-btn" href="/static/?tool=${encodeURIComponent(t.name)}" target="_self">Try it</a>
      </div>`;
    grid.appendChild(card);
  });
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

loadTools();
</script>
</body>
</html>
