services:
  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn pdf_agent.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/pdf_agent
      PDF_AGENT_REDIS_URL: redis://redis:6379/0
      PDF_AGENT_CELERY_ENABLED: "true"
      PDF_AGENT_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PDF_AGENT_OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      PDF_AGENT_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      PDF_AGENT_DATA_DIR: /app/data
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    user: pdfagent

  worker:
    build: .
    command: celery -A pdf_agent.worker.celery_app worker -Q pdf_executions_light,pdf_executions_heavy --loglevel=info
    environment:
      PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/pdf_agent
      PDF_AGENT_REDIS_URL: redis://redis:6379/0
      PDF_AGENT_CELERY_ENABLED: "true"
      PDF_AGENT_DATA_DIR: /app/data
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    user: pdfagent

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdf_agent
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  app_data:
  pg_data:
