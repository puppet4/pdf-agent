name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pdf_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Run migrations
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
        run: |
          find . -name '*.pyc' -delete
          find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          alembic upgrade head

      - name: Run tests
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
        run: python -m pytest tests/ -v --tb=short

      - name: Smoke test (API endpoints)
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
        run: |
          uvicorn pdf_agent.main:app --host 127.0.0.1 --port 8765 &
          SERVER_PID=$!
          sleep 5
          curl -sf http://127.0.0.1:8765/healthz | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['database']=='ok', f'DB check failed: {d}'"
          curl -sf http://127.0.0.1:8765/api/tools | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['tools'])>=30, f'Expected 30+ tools, got {len(d[\"tools\"])}'"
          curl -sf http://127.0.0.1:8765/api/workflows | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['workflows'])>=5, f'Expected 5+ workflows'"
          curl -sf http://127.0.0.1:8765/metrics | grep -q pdf_agent_http
          kill $SERVER_PID
          echo "Smoke tests passed"

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:prod
            ghcr.io/${{ github.repository }}:prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
