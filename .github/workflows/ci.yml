name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pdf_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Run migrations
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
        run: alembic upgrade head

      - name: Run tests
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: pdf-agent:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image (prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: pdf-agent:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max
