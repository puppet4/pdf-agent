name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pdf_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils ghostscript qpdf tesseract-ocr ocrmypdf

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Run migrations
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
          PDF_AGENT_ENVIRONMENT: test
          PDF_AGENT_API_KEY: ci-smoke-key-ci-smoke-key
        run: |
          find . -name '*.pyc' -delete
          find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          alembic upgrade head

      - name: Verify migration rollback loop
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
          PDF_AGENT_ENVIRONMENT: test
          PDF_AGENT_API_KEY: ci-smoke-key-ci-smoke-key
        run: bash scripts/verify_migrations.sh

      - name: Run tests
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
          PDF_AGENT_ENVIRONMENT: test
          PDF_AGENT_API_KEY: ci-smoke-key-ci-smoke-key
        run: python -m pytest tests/ -v --tb=short

      - name: Smoke test (API endpoints)
        env:
          PDF_AGENT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_CHECKPOINTER_DB_URL: postgresql://postgres:postgres@localhost:5432/pdf_agent
          PDF_AGENT_OPENAI_API_KEY: sk-placeholder
          PDF_AGENT_ENVIRONMENT: test
          PDF_AGENT_API_KEY: ci-smoke-key-ci-smoke-key
        run: |
          uvicorn pdf_agent.main:app --host 127.0.0.1 --port 8765 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID >/dev/null 2>&1 || true' EXIT
          AUTH_HEADER="X-API-Key: ci-smoke-key-ci-smoke-key"
          # Wait for server to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Health + metrics
          curl -sf http://127.0.0.1:8765/healthz | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['database']=='ok', f'DB check failed: {d}'"
          curl -sf http://127.0.0.1:8765/metrics | grep -q pdf_agent_http_requests_total

          # E2E: upload -> list -> download -> delete
          FILE_ID=$(curl -sf -H "$AUTH_HEADER" -F 'file=@tests/fixtures/minimal.pdf;type=application/pdf' http://127.0.0.1:8765/api/files | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Uploaded file: $FILE_ID"
          curl -sf -H "$AUTH_HEADER" "http://127.0.0.1:8765/api/files?page=1&limit=20" | python3 -c "import sys,json; d=json.load(sys.stdin); ids={item['id'] for item in d['files']}; fid='$FILE_ID'; assert fid in ids, f'Uploaded file missing in list: {fid}'"
          DL_URL="/api/files/$FILE_ID/download"
          echo "Download URL: $DL_URL"
          curl -sf -H "$AUTH_HEADER" http://127.0.0.1:8765$DL_URL -o /tmp/rotated.pdf
          python3 -c "data=open('/tmp/rotated.pdf','rb').read(); assert data[:4]==b'%PDF', 'Not a valid PDF'"
          curl -sf -H "$AUTH_HEADER" -X DELETE "http://127.0.0.1:8765/api/files/$FILE_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['deleted'] is True and d['id']== '$FILE_ID'"
          echo "Files API smoke test passed"

          # E2E: conversations create -> list -> get -> delete
          CONV_ID=$(curl -sf -H "$AUTH_HEADER" -X POST http://127.0.0.1:8765/api/conversations | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
          echo "Created conversation: $CONV_ID"
          curl -sf -H "$AUTH_HEADER" "http://127.0.0.1:8765/api/conversations?page=1&limit=20" | python3 -c "import sys,json; d=json.load(sys.stdin); ids={item['id'] for item in d['conversations']}; cid='$CONV_ID'; assert cid in ids, f'Conversation missing in list: {cid}'"
          GET_STATUS=$(curl -s -H "$AUTH_HEADER" -o /tmp/conversation.json -w "%{http_code}" "http://127.0.0.1:8765/api/conversations/$CONV_ID")
          CONV_ID="$CONV_ID" GET_STATUS="$GET_STATUS" python3 -c "import os,json; s=int(os.environ['GET_STATUS']); d=json.load(open('/tmp/conversation.json')); cid=os.environ['CONV_ID']; assert s == 200, f'Unexpected status: {s}, payload={d}'; assert d.get('id')==cid and isinstance(d.get('messages'), list); assert d.get('state',{}).get('status') in ('ok','degraded')"
          curl -sf -H "$AUTH_HEADER" -X DELETE "http://127.0.0.1:8765/api/conversations/$CONV_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['deleted'] is True and d['id']=='$CONV_ID'"
          echo "Conversations API smoke test passed"

          kill $SERVER_PID
          echo "All smoke tests passed"

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:prod
            ghcr.io/${{ github.repository }}:prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
