# Nginx configuration for PDF Agent
# Place this file at: /etc/nginx/sites-available/pdf-agent
# Then: ln -s /etc/nginx/sites-available/pdf-agent /etc/nginx/sites-enabled/
# Requires: certbot (apt install certbot python3-certbot-nginx)
#
# Initial setup (before TLS cert):
#   1. Set server_name to your domain
#   2. Run: nginx -t && systemctl reload nginx
#   3. Run: certbot --nginx -d yourdomain.com

upstream pdf_agent {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;  # CHANGE THIS

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;  # CHANGE THIS

    # TLS (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size (must match PDF_AGENT_MAX_UPLOAD_SIZE_MB)
    client_max_body_size 210m;

    # Timeouts for long-running tools (OCR, compress)
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;
    proxy_connect_timeout 30s;

    # SSE / streaming (disable buffering)
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://pdf_agent;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE support
        proxy_set_header Cache-Control no-cache;
    }

    # Static files — serve directly from nginx for better performance
    location /static/ {
        alias /app/src/pdf_agent/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Metrics — restrict to internal network only
    location /metrics {
        proxy_pass http://pdf_agent;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Health check — no auth required
    location /healthz {
        proxy_pass http://pdf_agent;
        access_log off;
    }

    access_log /var/log/nginx/pdf-agent.access.log;
    error_log /var/log/nginx/pdf-agent.error.log;
}
